services:
  db:
    image: postgres:16-alpine
    container_name: simap-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: simap
      POSTGRES_PASSWORD: simap
      POSTGRES_DB: simap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
