  <rect x="192" y="180" width="4" height="80" rx="1" fill="#003366"/>
  <rect x="204" y="180" width="12" height="80" rx="2" fill="#003366"/>
  <rect x="224" y="180" width="6" height="80" rx="1" fill="#003366"/>
  <rect x="238" y="180" width="4" height="80" rx="1" fill="#003366"/>
  <rect x="250" y="180" width="10" height="80" rx="2" fill="#003366"/>
  <rect x="268" y="180" width="4" height="80" rx="1" fill="#003366"/>
  <rect x="280" y="180" width="8" height="80" rx="2" fill="#003366"/>
  <rect x="296" y="180" width="6" height="80" rx="1" fill="#003366"/>
  <rect x="310" y="180" width="4" height="80" rx="1" fill="#003366"/>
  <rect x="322" y="180" width="10" height="80" rx="2" fill="#003366"/>

  <!-- Circular arrows - movement/tracking of assets -->
  <g transform="translate(256, 340)">
