name: CI/CD VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: image
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          source: "deploy/*"
          target: ${{ vars.VPS_PATH }}
          strip_components: 0

      - name: Run remote deploy script
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.image.outputs.image_tag }}
          GHCR_IMAGE: ${{ github.repository }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          TLS_CERT_PEM: ${{ secrets.TLS_CERT_PEM }}
          TLS_KEY_PEM: ${{ secrets.TLS_KEY_PEM }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          envs: IMAGE_TAG,GHCR_IMAGE,GHCR_USER,GHCR_TOKEN,APP_ENV_FILE,TLS_CERT_PEM,TLS_KEY_PEM
          script: |
            set -Eeuo pipefail
            mkdir -p "${{ vars.VPS_PATH }}"
            cd "${{ vars.VPS_PATH }}"
            printf "%s\n" "${APP_ENV_FILE}" > .env
            chmod 600 .env
            mkdir -p deploy/certs
            printf "%s\n" "${TLS_CERT_PEM}" > deploy/certs/server.crt
            printf "%s\n" "${TLS_KEY_PEM}" > deploy/certs/server.key
            chmod 644 deploy/certs/server.crt
            chmod 600 deploy/certs/server.key
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh
