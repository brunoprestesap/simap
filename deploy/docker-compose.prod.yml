x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  app:
    image: ghcr.io/${GHCR_IMAGE}:${IMAGE_TAG:-latest}
    container_name: simap-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.0
    logging: *default-logging
    networks:
      - simap_net

  db:
    image: postgres:16-alpine
    container_name: simap-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.0
    logging: *default-logging
    networks:
      - simap_net

  proxy:
    image: nginx:1.27-alpine
    container_name: simap-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.5
    logging: *default-logging
    networks:
      - simap_net

  db-backup:
    image: postgres:16-alpine
    container_name: simap-db-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups:/backups
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /backups
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S)
          file="/backups/simap_$${ts}.sql.gz"
          echo "[backup] iniciando dump em $${file}"
          if pg_dump --no-owner --no-privileges | gzip > "$${file}.tmp"; then
            mv "$${file}.tmp" "$${file}"
            echo "[backup] concluido $${file}"
          else
            echo "[backup] FALHA no dump $${file}" >&2
            rm -f "$${file}.tmp"
          fi
          find /backups -name 'simap_*.sql.gz' -mtime +$${BACKUP_RETENTION_DAYS} -delete || true
          sleep $${BACKUP_INTERVAL_SECONDS}
        done
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.5
    logging: *default-logging
    networks:
      - simap_net

volumes:
  pgdata:

networks:
  simap_net:
